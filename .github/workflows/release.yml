name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system .

      - name: Build executable (PyInstaller)
        run: |
          pip install pyinstaller
          pyinstaller app.py --onefile --name heic-converter-gui
        shell: bash

      # Upload only the correct binary per OS
      - name: Upload build artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: heic-converter-gui-linux
          path: dist/heic-converter-gui

      - name: Upload build artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: heic-converter-gui-windows
          path: dist/heic-converter-gui.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: heic-converter-gui-linux
          path: artifacts/
      - name: Rename Linux binary
        run: mv artifacts/heic-converter-gui artifacts/heic-converter-gui-linux
        shell: bash
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: heic-converter-gui-windows
          path: artifacts/
      - name: Rename Windows binary
        run: mv artifacts/heic-converter-gui.exe artifacts/heic-converter-gui-windows.exe
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/heic-converter-gui-windows.exe
            artifacts/heic-converter-gui-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
